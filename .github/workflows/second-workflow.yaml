name: test_project
on: [push, workflow_dispatch]
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: get code
              uses: actions/checkout@v3
            - name: install Node.js
              uses: actions/setup-node@v3
              with:
                node-version: '20'
            - name: install dependencies
              run:  npm ci
            - name: run test
              run: npm test
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: get code
              uses: actions/checkout@v3
            - name: install Node.js
              uses: actions/setup-node@v3
              with:
                node-version: '20'
            - name: install dependencies
              run:  npm ci
            - name: build project
              run: npm run build
            - name: deploy
              run: echo "deploying application"